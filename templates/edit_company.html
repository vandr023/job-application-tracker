{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Edit Company</h2>

<div class="card">
    <div class="card-header bg-primary text-white">
        Update Company Information
    </div>

    <div class="card-body">
        <form action="/companies/update/{{ company.company_id }}" method="POST" class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Company Name</label>
                <input type="text" name="company_name" class="form-control"
                       value="{{ company.company_name }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Industry</label>
                <input type="text" name="industry" class="form-control"
                       value="{{ company.industry }}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Website</label>
                <input type="text" name="website" class="form-control"
                       value="{{ company.website }}">
            </div>

            <div class="col-md-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control"
                       value="{{ company.city }}">
            </div>

            <div class="col-md-3">
                <label class="form-label">State</label>
                <input type="text" name="state" class="form-control"
                       value="{{ company.state }}">
            </div>

            <div class="col-md-12">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3">{{ company.notes }}</textarea>
            </div>

            <div class="col-md-12 d-flex justify-content-end">
                <button class="btn btn-success">Save Changes</button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
