<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Job Tracker" }}</title>

    <!-- Bootstrap 5 -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
        }
        .navbar-brand {
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Job Tracker</a>

        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="/companies">Companies</a>
            <a class="btn btn-outline-light btn-sm me-2" href="/jobs">Jobs</a>
            <a class="btn btn-outline-light btn-sm me-2" href="/applications">Applications</a>
            <a class="btn btn-outline-light btn-sm me-2" href="/contacts">Contacts</a>
            <a class="btn btn-warning btn-sm" href="/match">Job Match</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
