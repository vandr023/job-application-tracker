<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Job Tracker</span>
        </div>
    </nav>

    <div class="container text-center">

        <h1 class="mb-4">Welcome to Your Job Tracker</h1>
        <p class="lead mb-5">Manage companies, jobs, applications, contacts, and find your best matches.</p>

        <div class="row justify-content-center g-3">

            <div class="col-md-4">
                <a href="/dashboard" class="btn btn-outline-dark w-100 py-3">
                    Dashboard
                </a>
            </div>

            <div class="col-md-4">
                <a href="/companies" class="btn btn-outline-primary w-100 py-3">
                    View Companies
                </a>
            </div>

            <div class="col-md-4">
                <a href="/jobs" class="btn btn-outline-success w-100 py-3">
                    View Jobs
                </a>
            </div>

            <div class="col-md-4">
                <a href="/applications" class="btn btn-outline-warning w-100 py-3">
                    View Applications
                </a>
            </div>

            <div class="col-md-4">
                <a href="/contacts" class="btn btn-outline-info w-100 py-3">
                    View Contacts
                </a>
            </div>

            <div class="col-md-4">
                <a href="/match" class="btn btn-outline-danger w-100 py-3">
                    Job Match
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
